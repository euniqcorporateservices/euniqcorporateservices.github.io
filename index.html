<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Euniq Corporate Services</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:Inter;background:#060a14;color:#fff}

/* NAV */
.topbar{
display:flex;justify-content:space-between;
padding:15px 20px;
position:fixed;width:100%;
background:#0b1220;
z-index:100;
}

.nav{display:flex;gap:15px}
.nav a{color:#aaa;text-decoration:none}
.nav a:hover{color:#fff}

.menu-toggle{display:none}

@media(max-width:768px){
.menu-toggle{display:block;cursor:pointer}
.nav{
display:none;flex-direction:column;
position:absolute;top:60px;right:10px;
background:#0f172a;padding:15px;border-radius:10px;
}
.nav.show{display:flex;}
}

/* HERO */
.hero{
height:75vh;
display:flex;align-items:center;justify-content:center;
text-align:center;
background:url('https://images.unsplash.com/photo-1521737604893-d14cc237f11d') center/cover;
}

.section{padding:60px 20px;max-width:1100px;margin:auto}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
}

.card{
background:#0f172a;border-radius:12px;overflow:hidden;
}
.card img{width:100%;height:150px;object-fit:cover}

button{
padding:10px;border:none;border-radius:8px;
background:#5b6cff;color:white;cursor:pointer;margin:10px;
}
</style>
</head>

<body>

<div class="topbar">
<b>Euniq Corporate Services</b>

<div class="menu-toggle" onclick="toggleMenu()">☰</div>

<div class="nav" id="navMenu">
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="jobs.html">Jobs</a>
<a href="contact.html">Contact</a>
</div>
</div>

<div class="hero">
<h1>Hire Top Global Talent</h1>
</div>

<!-- INDUSTRIES -->
<div class="section">
<h2>Industries</h2>
<div class="grid">

<div class="card"><img src="https://images.unsplash.com/photo-1581092580497-e0d23cbdf1dc"><p>Tech</p></div>
<div class="card"><img src="https://images.unsplash.com/photo-1581092334651-ddf26d9a09d0"><p>Engineering</p></div>
<div class="card"><img src="https://images.unsplash.com/photo-1584515933487-779824d29309"><p>Healthcare</p></div>
<div class="card"><img src="https://images.unsplash.com/photo-1554224155-6726b3ff858f"><p>Finance</p></div>

<!-- FIXED -->
<div class="card"><img src="https://images.unsplash.com/photo-1557838923-2985c318be48"><p>Marketing</p></div>

<div class="card"><img src="https://images.unsplash.com/photo-1581092918056-0c4c3acd3789"><p>Oil & Gas</p></div>

</div>
</div>

<!-- JOB PREVIEW -->
<div class="section">
<h2>Latest Jobs</h2>

<div class="grid">
<div class="card">
<img src="https://images.unsplash.com/photo-1521737604893-d14cc237f11d">
<p>Accounting Manager</p>
<button onclick="apply()">Apply</button>
</div>
</div>
</div>

<script>
function toggleMenu(){
document.getElementById("navMenu").classList.toggle("show");
}

function apply(){
window.open("https://wa.me/2349054303209");
}
</script>

</body>
</html>
