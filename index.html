<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Euniq Corporate Services | Global Executive Recruitment</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap');

        body { font-family: 'Inter', sans-serif; }
        .heading-font { font-family: 'Playfair Display', sans-serif; }

        .hero-bg {
            background: linear-gradient(rgba(10,10,10,0.75), rgba(10,10,10,0.85)), url('https://picsum.photos/id/1015/2000/1200') center/cover no-repeat;
        }

        .mobile-menu { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-in-out; }
        .mobile-menu.open { max-height: 500px; }
    </style>
</head>

<body class="bg-zinc-950 text-white">

<!-- NAV -->
<nav class="fixed top-0 w-full bg-zinc-950/95 border-b border-white/10 z-50">
<div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">

    <div class="flex items-center gap-3">
        <img src="logo.png" class="h-10">
        <span class="text-xl font-bold heading-font">Euniq</span>
    </div>

    <div class="hidden md:flex gap-6 text-sm">
        <a href="#about">About</a>
        <a href="#services">Services</a>
    </div>

    <a href="mailto:recruitment@euniqcorporateservices.com?subject=Recruitment Inquiry&body=Hello Euniq Team," 
       class="px-5 py-2 border rounded-full text-sm">
       Get In Touch
    </a>

</div>
</nav>

<!-- HERO -->
<section class="hero-bg min-h-screen flex items-center justify-center text-center px-6">
    <div>
        <h1 class="text-5xl md:text-7xl font-bold heading-font mb-6">
            Premium Talent.<br>Global Reach.
        </h1>
        <p class="text-zinc-400 mb-10">We connect companies with top global professionals.</p>

        <button onclick="document.getElementById('contact-modal').classList.remove('hidden')" 
                class="bg-white text-black px-8 py-4 rounded-2xl font-semibold">
            Hire Talent
        </button>
    </div>
</section>

<!-- CONTACT MODAL -->
<div id="contact-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-6">

<div class="bg-zinc-900 rounded-3xl max-w-lg w-full">

<div class="p-8 border-b border-white/10 flex justify-between">
    <h3 class="text-xl font-semibold">Start Recruitment</h3>
    <button onclick="document.getElementById('contact-modal').classList.add('hidden')">×</button>
</div>

<div class="p-8">

<form action="https://formsubmit.co/euniqcorporateservices@gmail.com" method="POST" class="space-y-6">

<input type="hidden" name="_captcha" value="false">

<div>
<input type="text" name="name" required placeholder="Your Name / Company"
class="w-full bg-zinc-800 p-4 rounded-xl">
</div>

<div class="grid grid-cols-2 gap-4">
<input type="email" name="email" required placeholder="Email"
class="bg-zinc-800 p-4 rounded-xl">

<input type="tel" name="phone" placeholder="Phone"
class="bg-zinc-800 p-4 rounded-xl">
</div>

<textarea name="message" required placeholder="Your request..."
class="w-full bg-zinc-800 p-4 rounded-xl"></textarea>

<button type="submit"
class="w-full bg-white text-black py-4 rounded-xl font-semibold">
Submit Request
</button>

</form>

</div>
</div>
</div>

<!-- FOOTER -->
<footer class="text-center py-10 border-t border-white/10">

<p class="text-zinc-400 mb-4">Contact Us</p>

<div class="space-y-2 text-sm">
<a href="mailto:recruitment@euniqcorporateservices.com?subject=Recruitment Inquiry" class="block">
recruitment@euniqcorporateservices.com
</a>

<a href="mailto:contact@euniqcorporateservices.com?subject=General Inquiry" class="block">
contact@euniqcorporateservices.com
</a>

<a href="tel:+2348093489681" class="block">
+234 809 348 9681
</a>
</div>

</footer>

<script>
const btn = document.getElementById('mobile-menu-button');
</script>

</body>
</html>
