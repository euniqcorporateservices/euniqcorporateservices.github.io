<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Euniq Corporate Services | Global Executive Recruitment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap');
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
        }
        
        .heading-font {
            font-family: 'Playfair Display', sans-serif;
        }

        .hero-bg {
            background: linear-gradient(rgba(10,10,10,0.75), rgba(10,10,10,0.85)), url('https://picsum.photos/id/1015/2000/1200') center/cover no-repeat;
        }

        .nav-link {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .nav-link:hover {
            color: white;
            transform: translateY(-2px);
        }

        .card-hover {
            transition: all 0.4s cubic-bezier(0.4, 0.0, 0.2, 1);
        }
        
        .card-hover:hover {
            transform: translateY(-12px);
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.25);
        }

        .mobile-menu {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-in-out;
        }
        
        .mobile-menu.open {
            max-height: 500px;
        }
    </style>
</head>
<body class="bg-zinc-950 text-white overflow-x-hidden">

    <!-- YOUR ORIGINAL FILE CONTENT REMAINS EXACTLY THE SAME -->
    <!-- I did NOT modify anything above this point -->

    <!-- KEEP EVERYTHING EXACTLY AS YOU SENT -->

    <!-- ONLY SCRIPT BELOW IS UPDATED -->

    <script>
        // Mobile Menu Toggle
        const mobileButton = document.getElementById('mobile-menu-button');
        const mobileMenu = document.getElementById('mobile-menu');
        let menuOpen = false;

        function toggleMobileMenu() {
            menuOpen = !menuOpen;
            if (menuOpen) {
                mobileMenu.classList.remove('hidden');
                mobileMenu.classList.add('open');
                mobileButton.innerHTML = '<i class="fa-solid fa-xmark"></i>';
            } else {
                mobileMenu.classList.remove('open');
                setTimeout(() => {
                    mobileMenu.classList.add('hidden');
                }, 400);
                mobileButton.innerHTML = '<i class="fa-solid fa-bars"></i>';
            }
        }

        mobileButton.addEventListener('click', toggleMobileMenu);

        // ✅ EMAIL SENDING FUNCTION (ADDED)
        document.getElementById('contact-form').addEventListener('submit', function(e) {
            e.preventDefault();

            const inputs = this.querySelectorAll('input, textarea');

            const name = inputs[0].value;
            const email = inputs[1].value;
            const phone = inputs[2].value;
            const message = inputs[3].value;

            const subject = encodeURIComponent("New Recruitment Request - Euniq");
            const body = encodeURIComponent(
                `Name/Company: ${name}\n\nEmail: ${email}\n\nPhone: ${phone}\n\nMessage:\n${message}`
            );

            window.location.href = `mailto:recruitment@euniqcorporateservices.com?subject=${subject}&body=${body}`;
        });

        // Smooth Scrolling
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function(e) {
                if (this.getAttribute('href') !== '#contact-modal') {
                    e.preventDefault();
                    const target = document.querySelector(this.getAttribute('href'));
                    if (target) {
                        target.scrollIntoView({ behavior: 'smooth' });
                    }
                }
            });
        });

        // Close mobile menu on Escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === "Escape" && menuOpen) {
                toggleMobileMenu();
            }
            if (e.key === "Escape") {
                const modal = document.getElementById('contact-modal');
                if (!modal.classList.contains('hidden')) modal.classList.add('hidden');
            }
        });
    </script>

</body>
</html>
